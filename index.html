<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>BPC AI 預測系統</title>

<style>
:root{
  --bg:#0B1E3C;
  --accent:#00c3ff;
  --banker:#ff4d4f;
  --player:#00c3ff;
  --gold:#ffcc00;
}

body{
  margin:0;
  font-family:"Microsoft JhengHei";
  background: radial-gradient(circle at top, #12263f, #0B1E3C 70%);
  color:#fff;
}

.container{
  max-width:900px;
  margin:auto;
  padding:20px;
}

.glass{
  backdrop-filter: blur(12px);
  background: rgba(255,255,255,0.05);
  border:1px solid rgba(255,255,255,0.08);
  box-shadow:0 8px 30px rgba(0,0,0,0.4);
  border-radius:12px;
  padding:15px;
}

/* 輸入區 */
.input-area{
  display:flex;
  gap:10px;
  margin-bottom:10px;
}
input{
  flex:1;
  padding:14px;
  border-radius:10px;
  border:none;
  background:#0f2a4a;
  color:#fff;
  font-size:18px;
  text-align:center;
}
button{
  padding:14px 20px;
  border:none;
  border-radius:10px;
  background:var(--accent);
  color:#fff;
  cursor:pointer;
}
small{color:#aaa;}

/* 進度條 */
.progress{
  position:relative;
  height:35px;
  border-radius:10px;
  overflow:hidden;
  margin:15px 0;
}
.progress div{
  height:100%;
  width:0%;
  background:linear-gradient(90deg,var(--accent),var(--gold));
  transition:width .1s;
}
#percent{
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  color:#fff;
  font-weight:700;
}

/* 結果卡片 */
.result{
  display:flex;
  gap:10px;
  margin-top:15px;
}
.card{
  flex:1;
  padding:20px;
  text-align:center;
  font-weight:700;
  font-size:18px;
}

/* 建議卡片 */
.suggest-card{
  margin-top:20px;
  padding:20px;
  border-radius:12px;
  text-align:center;
  font-weight:900;
  font-size:22px;
  display:none;
}
.suggest-card.player{background:#003366;color:var(--player);}
.suggest-card.banker{background:#330000;color:var(--banker);}
</style>
</head>

<body>
<div class="container">

<div class="glass">
  🤖 AI：輸入6位數（前3閒，後3莊）<br>
  例：123456 → 閒123 莊456
</div>

<div class="input-area">
  <input id="cards" maxlength="6" placeholder="輸入6位數"/>
  <button onclick="run()">開始預測</button>
</div>
<small>前3位閒，後3位莊</small>

<div class="glass progress">
  <div id="bar"></div>
  <span id="percent">0%</span>
</div>

<div id="progressText">等待輸入…</div>

<div class="result">
  <div class="glass card" id="b">莊家 —</div>
  <div class="glass card" id="p">閒家 —</div>
</div>

<div id="suggest" class="suggest-card"></div>

</div>

<script>
function run(){
  const input=document.getElementById("cards").value;
  if(input.length!==6){
    document.getElementById("progressText").innerText="⚠️ 請輸入正確的6位數！";
    return;
  }

  let bar=document.getElementById("bar");
  let percent=document.getElementById("percent");
  let text=document.getElementById("progressText");
  let progress=0;

  let timer=setInterval(()=>{
    progress+=5;
    if(progress>=100){
      clearInterval(timer);
      progress=100;
      text.innerText="演算完成";

      // 模擬結果
      let bPct=(Math.random()*50+25).toFixed(1);
      let pPct=(100-bPct).toFixed(1);

      document.getElementById("b").innerText="莊 "+bPct+"%";
      document.getElementById("p").innerText="閒 "+pPct+"%";

      let sugBox=document.getElementById("suggest");
      if(parseFloat(pPct)>parseFloat(bPct)){
        sugBox.className="suggest-card player";
        sugBox.innerHTML=`👉 建議下注：Player<br>信心值：${pPct}%`;
      }else{
        sugBox.className="suggest-card banker";
        sugBox.innerHTML=`👉 建議下注：Banker<br>信心值：${bPct}%`;
      }
      sugBox.style.display="block";
    }
    bar.style.width=progress+"%";
    percent.innerText=Math.floor(progress)+"%";
  },50);
}
</script>

</body>
</html>
