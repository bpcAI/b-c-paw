<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>BPC AI 預測系統</title>

<link rel="manifest" href="manifest.json"/>

<style>
:root{
  --bg:#0B1E3C;
  --accent:#00c3ff;
  --gold:#ffcc00;
}

body{
  margin:0;
  font-family:"Microsoft JhengHei";
  background: radial-gradient(circle at top, #12263f, #0B1E3C 70%);
  color:#fff;
}

.glass{
  backdrop-filter: blur(12px);
  background: rgba(255,255,255,0.05);
  border:1px solid rgba(255,255,255,0.08);
  box-shadow:0 8px 30px rgba(0,0,0,0.4);
  border-radius:12px;
}

.container{
  max-width:900px;
  margin:auto;
  padding:20px;
}

.input-area{
  display:flex;
  gap:10px;
  margin-bottom:15px;
}

input{
  flex:1;
  padding:14px;
  border-radius:10px;
  border:none;
  background:#0f2a4a;
  color:#fff;
  font-size:18px;
  text-align:center;
}

button{
  padding:14px 20px;
  border:none;
  border-radius:10px;
  background:var(--accent);
  color:#fff;
  cursor:pointer;
}

/* 進度條 */
.progress{
  height:35px;
  border-radius:10px;
  overflow:hidden;
  margin:15px 0;
}
.progress div{
  height:100%;
  width:0%;
  background:linear-gradient(90deg,var(--accent),var(--gold));
  transition:width .1s;
}

#progressText{
  text-align:center;
  color:#aaa;
}

/* 結果 */
.result{
  display:flex;
  gap:10px;
  margin-top:15px;
}
.card{
  flex:1;
  padding:15px;
  text-align:center;
  font-weight:700;
  font-size:18px;
}

/* 建議 */
.suggestion{
  margin-top:20px;
  padding:20px;
  text-align:center;
  display:none;
}
.big{
  font-size:26px;
  font-weight:900;
}
.small{
  font-size:14px;
  color:#aaa;
}
</style>
</head>

<body>
<div class="container">

<div class="glass" style="padding:15px;margin-bottom:15px">
  🤖 AI：輸入6位數（前3閒，後3莊）<br>
  例：123456 → 閒123 莊456
</div>

<div class="input-area">
  <input id="cards" maxlength="6" placeholder="輸入6位數"/>
  <button onclick="run()">開始預測</button>
</div>

<div class="glass progress">
  <div id="bar"></div>
</div>

<div id="progressText">等待輸入…</div>

<div class="result">
  <div class="glass card" id="b">莊家 —</div>
  <div class="glass card" id="p">閒家 —</div>
</div>

<div id="suggest" class="glass suggestion"></div>

</div>

<script>
/* 卡牌權重 */
const CARD_VALUES={
"A":-5,"2":-4,"3":-3,"4":-2,"5":1,
"6":2,"7":3,"8":4,"9":5,
"0":0,"10":0,"J":0,"Q":0,"K":0
};

const AP={
0:0.5,1:0.4,2:0.3,3:0.3,4:0.1,
5:0.2,6:0.3,7:0.3,8:0.5,9:0.1
};

/* 🔥 解析6位數 */
function parseInput(input){
  if(input.length!==6){
    alert("請輸入6位數！");
    return null;
  }
  const arr=input.split("");
  return {
    player: arr.slice(0,3),
    banker: arr.slice(3,6)
  };
}

function cp(arr){
  return arr.reduce((s,c)=>s+(CARD_VALUES[c]||0),0);
}

function point(arr){
  let t=0;
  arr.forEach(c=>{
    if(c==="A") t+=1;
    else t+=parseInt(c)||0;
  });
  return t%10;
}

/* 🚀 主流程 */
function run(){
  const input=document.getElementById("cards").value;
  const data=parseInput(input);
  if(!data) return;

  const p=data.player;
  const b=data.banker;

  let bar=document.getElementById("bar");
  let text=document.getElementById("progressText");

  /* 顯示解析結果 */
  text.innerText=`閒:${p.join(" ")} ｜ 莊:${b.join(" ")}`;

  let duration=Math.random()*1000+1000;
  let progress=0;
  let step=100/(duration/20);

  let timer=setInterval(()=>{
    progress+=step;

    if(progress>=100){
      clearInterval(timer);
      progress=100;

      let bcp=cp(b);
      let pcp=cp(p);

      let bp=point(b);
      let pp=point(p);

      let bAdv=(bcp+pcp)*AP[bp];
      let pAdv=(bcp+pcp)*AP[pp];

      let total=Math.abs(bAdv)+Math.abs(pAdv)||1;

      let bPct=(Math.abs(bAdv)/total*100).toFixed(1);
      let pPct=(Math.abs(pAdv)/total*100).toFixed(1);

      document.getElementById("b").innerText="莊 "+bPct+"%";
      document.getElementById("p").innerText="閒 "+pPct+"%";

      let sug="Wait";
      if(pAdv>bAdv) sug="Player";
      else if(bAdv>pAdv) sug="Banker";

      let color = sug==="Player"?"#00c3ff":
                  sug==="Banker"?"#ff4d4f":"#aaa";

      let confidence=Math.max(bPct,pPct);

      let box=document.getElementById("suggest");
      box.style.display="block";
      box.innerHTML=`
        <div class="big" style="color:${color}">
        👉 建議下注：${sug}
        </div>
        <div class="small">
        信心值：${confidence}%
        </div>
      `;

      text.innerText="演算完成";
    }

    bar.style.width=progress+"%";
  },20);
}

/* 🔥 限制只能輸入數字 */
document.getElementById("cards").addEventListener("input",(e)=>{
  e.target.value=e.target.value.replace(/[^0-9]/g,"").slice(0,6);
});

/* 📱 PWA */
if("serviceWorker" in navigator){
  navigator.serviceWorker.register("sw.js");
}
</script>

</body>
</html>
